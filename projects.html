  <!-- ── Pottery Wheel ──────────────────────────────────────────────── -->
  <section class="clay-section">
    <canvas id="clay-canvas"></canvas>

    <div class="clay-hint">
      Move mouse to position tool &nbsp;·&nbsp; Click to sculpt &nbsp;·&nbsp;
      <kbd>R</kbd> reset &nbsp;·&nbsp; <kbd>S</kbd> smooth
    </div>

    <div class="clay-controls">
      <button class="clay-btn active" data-mode="carve">Carve</button>
      <button class="clay-btn" data-mode="expand">Expand</button>
      <button class="clay-btn" id="btn-smooth">Smooth</button>
      <button class="clay-btn" id="btn-reset">Reset</button>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="clay.js"></script>
